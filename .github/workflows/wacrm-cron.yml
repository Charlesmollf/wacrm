name: wacrm automations cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Drain pending automations
        run: |
          curl -s -H "x-cron-secret: ${{ secrets.WACRM_CRON_SECRET }}" https://aqua-gaur-598822.hostingersite.com/api/automations/cron
