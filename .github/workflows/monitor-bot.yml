name: Monitor Bot Kaffeejager

# Corre en la nube de GitHub (siempre encendido, sin depender de tu Mac).
# Si el CRM no responde o hay clientes sin respuesta, la corrida FALLA
# y GitHub te envia un correo automatico a la cuenta del repo.

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:          # boton para correr manualmente

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Chequeo de salud del CRM
        env:
          BASE: https://aqua-gaur-598822.hostingersite.com/api/v1
          KEY: ${{ secrets.WACRM_API_KEY }}
          UMBRAL_MIN: "20"   # minutos sin responder para alertar
        run: |
          set -uo pipefail
          AUTH="Authorization: Bearer $KEY"

          # 1) El CRM responde?
          code=$(curl -s -m 25 -o /tmp/me.json -w "%{http_code}" -H "$AUTH" "$BASE/me" || echo 000)
          if [ "$code" != "200" ]; then
            echo "::error::CRM NO RESPONDE (HTTP $code). Revisa la app en Hostinger y status.anthropic.com."
            exit 1
          fi
          echo "CRM en linea."

          # 2) Conversaciones abiertas con mensajes del cliente sin responder
          convs=$(curl -s -m 25 -H "$AUTH" "$BASE/conversations?limit=10")
          ids=$(echo "$convs" | jq -r '.data[] | select(.status=="open") | .id')
          now=$(date +%s)
          problemas=0
          detalle=""

          for id in $ids; do
            last=$(curl -s -m 25 -H "$AUTH" "$BASE/conversations/$id/messages?limit=1")
            dir=$(echo "$last" | jq -r '.data[0].direction // empty')
            at=$(echo "$last"  | jq -r '.data[0].created_at // empty')
            txt=$(echo "$last" | jq -r '.data[0].content_text // "(sin texto)"')
            nombre=$(echo "$convs" | jq -r --arg id "$id" '.data[] | select(.id==$id) | .contact.name // .contact.phone // "Cliente"')
            if [ "$dir" = "inbound" ] && [ -n "$at" ]; then
              ts=$(date -d "$at" +%s 2>/dev/null || echo 0)
              if [ "$ts" -gt 0 ]; then
                edad=$(( (now - ts) / 60 ))
                if [ "$edad" -ge "$UMBRAL_MIN" ]; then
                  problemas=$((problemas+1))
                  detalle="$detalle | $nombre: hace ${edad} min -> \"$txt\""
                fi
              fi
            fi
          done

          if [ "$problemas" -gt 0 ]; then
            echo "::error::$problemas cliente(s) SIN RESPUESTA del bot:$detalle"
            exit 1
          fi
          echo "Todo bien: sin mensajes atascados."

